</head>  <body style="margin:0;background:black;"><script src="https://gist.github.com/iannmiui-png/045135c733efd0b86170f478a3264cc0.js"></script><br><script src="https://gist.github.com/iannmiui-png/b94c7494e8f056ec841edfa5372584b7.js"></script>

<canvas id="cv"></canvas>
<script>
const A = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0";

const M = [
    [0,4,8,3,7],
    [4,8,3,4,5],
    [8,3,7,5,3],
    [3,4,5,3,1],
    [7,5,3,1,0],
];

const DAFNE0 = [
    "DAFNE",
    "ABRDN",
    "FR0RF",
    "NDRBA",
    "ENFAD",
];

function add1_cell(ch){
    let idx = A.indexOf(ch);
    return A[(idx+1)%A.length];
}

function mul5x5_cell(ch, off){
    let idx = A.indexOf(ch);
    return A[(idx+off)%A.length];
}

// 9 uneven zones mapped to 5×5
const ZONES = [
    [[0,0],[0,1],[1,0],[1,1]],
    [[0,2],[0,3],[1,2],[1,3]],
    [[0,4],[1,4]],
    [[2,0],[2,1],[3,0],[3,1]],
    [[2,2],[2,3],[3,2],[3,3]],
    [[2,4],[3,4]],
    [[4,0],[4,1]],
    [[4,2],[4,3]],
    [[4,4]],
];

// --- Turtle-like renderer ---
const cv = document.getElementById("cv");
cv.width = window.innerWidth;
cv.height = window.innerHeight;
const ctx = cv.getContext("2d");

let CELL = 40;
let originX = 50;
let originY = 50;

function draw_cell(x, y, letter){
    let shade = letter.charCodeAt(0) / 255;
    ctx.fillStyle = `rgb(${shade*255},${shade*255},${shade*255})`;
    ctx.fillRect(x, y, CELL, CELL);
}

function draw_block(block, x, y){
    for(let r=0;r<5;r++){
        for(let c=0;c<5;c++){
            draw_cell(x + c*CELL, y + r*CELL, block[r][c]);
        }
    }
}

// --- Main loop ---
let b = DAFNE0.map(r => r.split(""));
let zone = 0;

function step(){
    // mutate only one zone
    for(const [r,c] of ZONES[zone]){
        b[r][c] = mul5x5_cell(b[r][c], M[r][c]);
    }

    ctx.clearRect(0,0,cv.width,cv.height);
    draw_block(b, originX, originY);

    zone = (zone+1)%9;
    requestAnimationFrame(step);
}

step();
</script></body></html>
